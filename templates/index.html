<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle Translator</title>
</head>
  <body>
    <h1>Upload Your SRT File</h1>
    <form method="POST" action="" enctype="multipart/form-data">
      <p><input type="file" name="subtitle"></p>
      <p><input type="submit" value="Submit"></p>
    </form>
    <div>{% if subtitle == None %}
        <h3>NOTHING</h3>
        
    {% else %}
        <p>{{subtitle}}</p>
    {% endif %}</div>
  </body>
</html>
